<!DOCTYPE html>
<html>
<head>
    <title>{{title}}</title>
    
    <link rel="stylesheet" href="{{url_for('static', filename='css/login.css')}}">
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
    <!-- Bootstrap JS and Popper -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</head>
<body class="bg-light d-flex justify-content-center align-items-center vh-100">
    <div class="card shadow-lg p-4" style="width: 22rem; border-radius: 1rem;">
        <h3 class="text-center mb-4">{{title}}</h3>
        <form method="POST" action="{% block submission_endpoint %}{{ url_for('auth.signup') }}{% endblock %}">
            {% block email %}
            <div class="mb-3">
                <label for="email" class="form-label">Email address</label>
                <input type="email" name="email" class="form-control" id="email" placeholder="Enter email" required>
            </div>
            {% endblock %}

            {% block password %}
            <div class="{{ 'mb-3' if valid_password else '' }}">
                <label for="password" class="form-label">Password</label>
                <input type="password" name="password" class="form-control" id="password" placeholder="Enter password" required>
            </div>
            {% endblock %}

            {% block invalid_password %}
            {% if not valid_password %}
            <div class="mb-3 text-center text-danger">
                <small>Invalid password</small>
            </div>
            {% endif %}
            {% endblock %}

            {% block i_am_a_selection %}
            <div class="mb-3 form-group">
                <label for="role" class="form-label">I am a</label>
                <select class="form-select" name="i-am-a" id="roleSelect" required>
                    <option>Choose...</option>
                    <option>Teacher</option>
                    <option>Student</option>
                </select>
            </div>
            {% endblock %}

            {% block remember_me %}
            <div class="mb-3 form-check">
                <input type="checkbox" name="remember-me" class="form-check-input" id="remember">
                <label class="form-check-label" for="remember">Remember me</label>
            </div>
            {% endblock %}

            {% block submit %}
            <button type="submit" class="btn btn-primary w-100">
                {% block submit_text %}Create Account{% endblock %}
            </button>
            {% endblock %}
        </form>
    </div>
</body>
</html>
